name: Deploy SiropHub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAcNkVS8-DpfRbtfEP2NtDx5Gk1LIuQU64
          VITE_FIREBASE_AUTH_DOMAIN: sirophub-61206.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: sirophub-61206
          VITE_FIREBASE_STORAGE_BUCKET: sirophub-61206.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "104979165365"
          VITE_FIREBASE_APP_ID: 1:104979165365:web:529b3df87338746858cefc
          VITE_SUPABASE_URL: https://wgbybjgatmclrarjtgjh.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_J8SZGTkDNwTBmsP31MhILg_6zzCfrFC

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
